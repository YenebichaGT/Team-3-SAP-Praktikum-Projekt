<!DOCTYPE html> 
<html>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
<body>
<button type="button" onclick="chartDisplay(0)">Jahr</button> 
<button type="button" onclick="chartDisplay(1)">Quartal</button>            
<button type="button" onclick="chartDisplay(2)">Monat</button> 
<p id="demo">Jahresansicht</p>
<canvas id="overview" style="width:100%;max-width:700px"></canvas>

<script>
var xyValues = [ // ausgedachte Werte von Chatgpt

  // Januar
  {x: 1, y: 1200},
  {x: 1.25, y: 1350},
  {x: 1.5, y: 1280},
  {x: 1.75, y: 1420},

  // Februar
  {x: 2, y: 1400},
  {x: 2, y: 1500},
  {x: 2, y: 1450},
  {x: 2, y: 1550},

  // März
  {x: 3, y: 1600},
  {x: 3, y: 1580},
  {x: 3, y: 1700},
  {x: 3, y: 1650},

  // April
  {x: 4, y: 1720},
  {x: 4, y: 1680},
  {x: 4, y: 1800},
  {x: 4, y: 1750},

  // Mai
  {x: 5, y: 1850},
  {x: 5, y: 1900},
  {x: 5, y: 1780},
  {x: 5, y: 1950},

  // Juni
  {x: 6, y: 2000},
  {x: 6, y: 2100},
  {x: 6, y: 2050},
  {x: 6, y: 2150},

  // Juli
  {x: 7, y: 2200},
  {x: 7, y: 2250},
  {x: 7, y: 2300},
  {x: 7, y: 2400},

  // August
  {x: 8, y: 2350},
  {x: 8, y: 2450},
  {x: 8, y: 2500},
  {x: 8, y: 2600},

  // September
  {x: 9, y: 2550},
  {x: 9, y: 2650},
  {x: 9, y: 2700},
  {x: 9, y: 2800},

  // Oktober
  {x: 10, y: 2750},
  {x: 10, y: 2850},
  {x: 10, y: 2900},
  {x: 10, y: 3000},

  // November
  {x: 11, y: 2950},
  {x: 11, y: 3100},
  {x: 11, y: 3200},
  {x: 11, y: 3300},

  // Dezember
  {x: 12, y: 3400},
  {x: 12, y: 3500},
  {x: 12, y: 3600},
  {x: 12, y: 3800},

];

var chart; 
var xMin = 1, xMax = 12;

function chartDisplay(span) {
    var view;
    var filteredData;
    
    switch(span) {
        case 0:
            view = "Jahresansicht";
            filteredData = xyValues; 
            xMin = 1; xMax = 12;
            break;
        case 1:
            view = "Quartalsansicht";
            filteredData = xyValues.filter(d => d.x >= 3 && d.x <= 6); // Q2 
            xMin = 3; xMax = 6;
            break;
        case 2:
            view = "Monatsansicht";
            filteredData = xyValues.filter(d => d.x == 1); 
            xMin = 1; xMax = 1.9;
            break;
        default:
            view = "Unbekannt";
    }
    
    document.getElementById("demo").innerHTML = view;
    
    chart.data.datasets[0].data = filteredData;
    chart.update();
}


chart = new Chart("overview", {
  type: "scatter",
  data: {
    datasets: [{
      pointRadius: 4,
      pointBackgroundColor: "rgb(0,0,255)",
      data: xyValues
    }]
  },
  options: {
    legend: {display: false},
    scales: {
      xAxes: [{ticks: {min: 1, max: 12}}],
      yAxes: [{ticks: {min: 0, max: 4000}}],
    }
  }
});
</script>
    

</body>
</html>
