<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.js"></script>
    <link rel="stylesheet" href="stylesDB.css">
  </head>
  <body>
    <header class="fixed-header">
      <div class="header-inner">
        <div class="left">
          <div class="logo">ORBIT</div>
        </div>
        <div class="center">
          <nav class="main-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="#">Buchungen</a>
          </nav>
        </div>
        <div class="right">
          <button id="profileBtn" class="profile-btn" aria-haspopup="true" aria-expanded="false">
            <span class="profile-pic">JD</span>
          </button>
          <div id="profileDropdown" class="profile-dropdown" role="menu" aria-hidden="true">
            <a href="#" role="menuitem">Profil</a>
            <a href="#" role="menuitem">Einstellungen</a>
            <a href="#" role="menuitem">Kontakt</a>
            <a onclick="logout()" role="menuitem">Logout</a>
          </div>
        </div>
      </div>
    </header>

    <!-- Modal für Widget-Verwaltung -->
    <div id="widgetModal" class="modal" role="dialog" aria-hidden="true" aria-labelledby="widgetModalTitle">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="widgetModalTitle">Widgets konfigurieren</h2>
          <button id="closeModalBtn" class="close-btn" aria-label="Schließen">&times;</button>
        </div>
        <div class="modal-body">
          <p class="modal-description">Wählen Sie die Widgets aus, die auf Ihrem Dashboard angezeigt werden sollen:</p>
          <div id="widgetCheckboxes" class="widget-checkboxes">
            <!-- Wird durch JavaScript gefüllt -->
          </div>
        </div>
        <div class="modal-footer">
          <button id="cancelBtn" class="btn btn-secondary">Abbrechen</button>
          <button id="saveBtn" class="btn btn-primary">Speichern</button>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="dashboard-grid" id="dashboardGrid">
        <!-- Widgets werden durch JavaScript eingefügt -->
      </div>
    </div>
    <footer>
        <p>&copy; 2024 SAP. Alle Rechte vorbehalten.</p>
    </footer>
    <script src="scriptDB.js"></script>
  </body>
</html>
