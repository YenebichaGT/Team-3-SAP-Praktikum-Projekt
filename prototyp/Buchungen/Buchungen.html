<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buchungen</title>
    <link rel="stylesheet" href="stylesB.css">
    <style>
      .content-wrapper {
        padding: 20px;
        max-width: 1400px;
        margin: 0 auto;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .page-header h1 {
        margin: 0;
        color: #333;
        font-size: 28px;
      }

      .page-header button {
        padding: 10px 20px;
        background-color: #333;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        transition: background-color 0.3s;
      }

      .page-header button:hover {
        background-color: #000;
      }

      .table-frame {
        background-color: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        overflow: hidden;
      }

      .table-frame iframe {
        width: 100%;
        height: 750px;
        border: none;
        display: block;
      }

      @media (max-width: 768px) {
        .page-header {
          flex-direction: column;
          gap: 15px;
        }

        .page-header button {
          width: 100%;
        }

        .table-frame iframe {
          height: 600px;
        }
      }
    </style>
  </head>
  <body>
    <header class="fixed-header">
      <div class="header-inner">
        <div class="left">
          <div class="logo">ORBIT</div>
        </div>
        <div class="center">
          <nav class="main-nav">
            <a href="../Dashboard/dashboard.html">Dashboard</a>
            <a href="Buchungen.html">Buchungen</a>
          </nav>
        </div>
        <div class="right">
          <button id="profileBtn" class="profile-btn" aria-haspopup="true" aria-expanded="false">
            <span class="profile-pic">JD</span>
          </button>
          <div id="profileDropdown" class="profile-dropdown" role="menu" aria-hidden="true">
            <a href="#" role="menuitem">Profil</a>
            <a href="#" role="menuitem">Einstellungen</a>
            <a href="#" role="menuitem">Kontakt</a>
            <a onclick="logout()" role="menuitem">Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="content-wrapper">
      <div class="page-header">
        <h1>Buchungen</h1>
        <button onclick="toggleEditModeFromParent()">✏️ Tabelle bearbeiten</button>
      </div>

      <div class="table-frame">
        <iframe id="tableFrame" src="../Tabelle/table.html" title="Transaktionen Tabelle"></iframe>
      </div>
    </div>

    <footer>
      <p>&copy; 2024 SAP. Alle Rechte vorbehalten.</p>
    </footer>

    <script src="scriptB.js"></script>
  </body>
</html>
